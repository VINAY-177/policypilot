<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yojana Mitra — Sign In / Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            z-index: 10;
        }
        .login-box {
            max-width: 420px;
            width: 100%;
            padding: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
        }
        .login-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .login-logo img {
            width: 50px;
            height: 50px;
        }
        .login-title {
            font-family: var(--font-heading);
            font-size: 28px;
            margin-bottom: 8px;
        }
        .login-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .login-form .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .login-submit {
            margin-top: 10px;
        }
        
        /* Auth Tabs */
        .auth-tabs {
            display: flex;
            background: rgba(16, 185, 129, 0.1);
            border-radius: var(--border-radius-xs);
            padding: 4px;
            margin-bottom: 24px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            border-radius: var(--border-radius-xs);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .auth-tab.active {
            background: white;
            color: var(--accent-primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .auth-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .auth-section.active {
            display: block;
        }
        
        .flash-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <div class="login-container">
        <div class="glass-card login-box">
            <div class="login-logo">
                <img src="/static/logo.png?v=3" alt="Yojana Mitra" style="width: 80px; height: 80px; object-fit: contain;">
                <h1 class="logo-text" style="font-size: 32px;">योजना <span class="logo-accent">Mitra</span></h1>
            </div>
            
            <h2 class="login-title">Welcome</h2>
            <p class="login-subtitle">Sign in to find the best government schemes tailored specifically for you.</p>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="flash-msg">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="switchAuth('login')">Sign In</div>
                <div class="auth-tab" id="tab-register" onclick="switchAuth('register')">Create Account</div>
            </div>

            <!-- LOGIN FORM -->
            <div id="section-login" class="auth-section active">
                <form action="/login" method="POST" class="login-form">
                    <div class="form-group">
                        <label for="login-phone">Phone Number</label>
                        <input type="tel" id="login-phone" name="phone" placeholder="10-digit mobile number" required pattern="[0-9]{10}" maxlength="10" minlength="10" title="Please enter a valid 10-digit mobile number" style="width: 100%; padding: 14px 16px; border-radius: var(--border-radius-xs); border: 1px solid var(--glass-border); background: var(--bg-tertiary); font-family: var(--font-body); font-size: 15px;">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" placeholder="Enter password" required style="width: 100%; padding: 14px 16px; border-radius: var(--border-radius-xs); border: 1px solid var(--glass-border); background: var(--bg-tertiary); font-family: var(--font-body); font-size: 15px;">
                    </div>
                    
                    <button type="submit" class="submit-btn login-submit">Sign In</button>
                </form>
            </div>

            <!-- REGISTER FORM -->
            <div id="section-register" class="auth-section">
                <form action="/register" method="POST" class="login-form">
                    <div class="form-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" name="name" placeholder="E.g. Ramesh Kumar" required style="width: 100%; padding: 14px 16px; border-radius: var(--border-radius-xs); border: 1px solid var(--glass-border); background: var(--bg-tertiary); font-family: var(--font-body); font-size: 15px;">
                    </div>
                    <div class="form-group">
                        <label for="reg-phone">Phone Number</label>
                        <input type="tel" id="reg-phone" name="phone" placeholder="10-digit mobile number" required pattern="[0-9]{10}" maxlength="10" minlength="10" title="Please enter a valid 10-digit mobile number" style="width: 100%; padding: 14px 16px; border-radius: var(--border-radius-xs); border: 1px solid var(--glass-border); background: var(--bg-tertiary); font-family: var(--font-body); font-size: 15px;">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" name="password" placeholder="Create a password" required style="width: 100%; padding: 14px 16px; border-radius: var(--border-radius-xs); border: 1px solid var(--glass-border); background: var(--bg-tertiary); font-family: var(--font-body); font-size: 15px;">
                    </div>
                    
                    <button type="submit" class="submit-btn login-submit">Create Account</button>
                </form>
            </div>

        </div>
    </div>

    <script>
        function switchAuth(type) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-section').forEach(s => s.classList.remove('active'));
            
            document.getElementById('tab-' + type).classList.add('active');
            document.getElementById('section-' + type).classList.add('active');
            
            // Adjust title
            if(type === 'login') {
                document.querySelector('.login-title').innerText = 'Welcome Back';
                document.querySelector('.login-subtitle').innerText = 'Sign in to find the best government schemes tailored specifically for you.';
            } else {
                document.querySelector('.login-title').innerText = 'Create Account';
                document.querySelector('.login-subtitle').innerText = 'Join Yojana Mitra to securely save your profile and scheme matches.';
            }
        }
    </script>
</body>
</html>
